<!DOCTYPE html>
<html>

<head>

    <title>AI Resume Analyzer</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="container">

        <h1>AI Resume Analyzer</h1>

        <form method="POST" enctype="multipart/form-data">

            <input type="file" name="resume" accept=".pdf">

            <button type="submit">

                Upload Resume

            </button>

        </form>

        <h2>Extracted Text</h2>

        <pre>{{ text }}</pre>

    </div>

</body>

</html>
